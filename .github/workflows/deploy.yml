name: Deploy Pokemon Number Game to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "pokemon-number-game/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: npm
          cache-dependency-path: pokemon-number-game/package-lock.json

      - name: Install dependencies
        working-directory: pokemon-number-game
        run: npm ci

      - name: Build application
        working-directory: pokemon-number-game
        run: npm run build

      # BrowserRouterで子ページを直接開いた場合の404対策
      - name: Create SPA fallback
        run: cp pokemon-number-game/dist/index.html pokemon-number-game/dist/404.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: pokemon-number-game/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
